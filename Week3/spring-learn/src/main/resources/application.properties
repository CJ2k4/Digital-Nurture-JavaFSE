server.port=8083

logging.level.org.springframework=info
logging.level.com.cognizant.springlearn=debug
logging.pattern.console=%d{yyMMdd}|%d{HH:mm:ss.SSS}|%-20.20thread|%5p|%-25.25logger{25}|%25M|%m%n

# HS256 requires a key of at least 256 bits (32 bytes). The hands-on document uses
# "secretkey", which is 9 bytes and is rejected outright by jjwt 0.12.
jwt.secret=springlearnsecretkeyforjwtsigning256bits
jwt.expiration-ms=1200000
