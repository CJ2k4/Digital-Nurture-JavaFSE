# H2 in-memory profile: lets the hands-on run without a local MySQL install.
# Activate with: mvn spring-boot:run -Dspring-boot.run.profiles=h2

spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:ormlearn;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# schema.sql and data.sql create and populate the country table
spring.sql.init.mode=always
